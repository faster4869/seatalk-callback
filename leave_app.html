<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請假申請</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text2: #64748b;
      --text3: #94a3b8;
      --accent: #f97316;
      --success: #10b981;
      --danger: #ef4444;
      --pending: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* Background grid */ 
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.3; pointer-events: none; z-index: 0; }

    .container { max-width: 640px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }

    /* Header */ 
    .header { margin-bottom: 40px; animation: fadeDown 0.6s ease; }
    .header-tag { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; }
    .header h1 { font-size: 28px; font-weight: 700; line-height: 1.2; letter-spacing: -0.5px; }
    .header h1 span { color: var(--accent); }
    
    /* 補回的 User Badge 樣式 */
    .user-badge { display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
    .user-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }

    /* Form */ 
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; animation: fadeUp 0.6s ease 0.2s both; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: 'DM Mono', monospace; }
    .form-control { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: 'Noto Sans TC', sans-serif; transition: border-color 0.2s; outline: none; appearance: none; }
    .form-control:focus { border-color: var(--accent); }
    .form-control option { background: var(--surface2); }
    .form-row { display: grid; gap: 16px; }
    textarea.form-control { resize: vertical; min-height: 90px; }
    
    .submit-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif; letter-spacing: 1px; position: relative; overflow: hidden; }
    .submit-btn:hover { background: #ff8555; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Keyframes */
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="header-tag">Leave Application</div>
      <h1>請假<span>申請</span></h1>
      <div class="user-badge">
        <div class="user-dot"></div>
        <span id="userEmailDisplay">employee@yourcompany.com</span>
      </div>
    </div>

    <div class="form-card">
      
      <div class="form-group">
        <label class="form-label">假別</label>
        <select class="form-control" id="leaveType">
          <option value="annual">特別休假 (特休)</option>
          <option value="personal">事假</option>
          <option value="sick">病假</option>
          <option value="official">公假</option>
          <option value="compensatory">補休</option>
        </select>
      </div>

      <div class="form-row" style="grid-template-columns: 1fr 1fr;">
        <div class="form-group">
          <label class="form-label">開始時間</label>
          <div style="display: flex; gap: 6px; align-items: center;">
            <input type="date" class="form-control" id="startDate" onchange="calculateDuration()">
            <select class="form-control" id="startHour" onchange="calculateDuration()" style="padding: 12px 4px; min-width: 50px;"></select>
            <span style="font-weight: bold; color: var(--text2);">:</span>
            <select class="form-control" id="startMinute" onchange="calculateDuration()" style="padding: 12px 4px; min-width: 55px;">
              <option value="00">00</option>
              <option value="30">30</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">結束時間</label>
          <div style="display: flex; gap: 6px; align-items: center;">
            <input type="date" class="form-control" id="endDate" onchange="calculateDuration()">
            <select class="form-control" id="endHour" onchange="calculateDuration()" style="padding: 12px 4px; min-width: 50px;"></select>
            <span style="font-weight: bold; color: var(--text2);">:</span>
            <select class="form-control" id="endMinute" onchange="calculateDuration()" style="padding: 12px 4px; min-width: 55px;">
              <option value="00">00</option>
              <option value="30">30</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Duration</label>
        <div id="durationDisplay" style="height: 24px; display: flex; align-items: center; font-weight: 700; color: var(--accent); font-size: 16px;">
          0 hrs
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">原因</label>
        <textarea class="form-control" id="reason" placeholder="請簡述請假原因..."></textarea>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitLeave()">
        送出申請
      </button>
    </div>
  </div>

  <script>
    // 網頁載入時自動執行
    document.addEventListener("DOMContentLoaded", function() {
      populateHours();
      setDefaultDates();
    });

    // 自動產生 00~23 的下拉選單選項
    function populateHours() {
      const startHour = document.getElementById("startHour");
      const endHour = document.getElementById("endHour");
      
      for (let i = 0; i < 24; i++) {
        let hourStr = i.toString().padStart(2, '0'); // 補零
        startHour.add(new Option(hourStr, hourStr));
        endHour.add(new Option(hourStr, hourStr));
      }
      
      // 預設選擇時間
      startHour.value = "09";
      endHour.value = "18";
    }

    // 設定日期預設為今天
    function setDefaultDates() {
      const localDate = new Date();
      const offset = localDate.getTimezoneOffset() * 60000;
      const today = new Date(localDate.getTime() - offset).toISOString().split('T')[0];
      
      document.getElementById("startDate").value = today;
      document.getElementById("endDate").value = today;
      calculateDuration(); 
    }

    // 計算時數並更新畫面
    function calculateDuration() {
      const startDate = document.getElementById("startDate").value;
      const startHour = document.getElementById("startHour").value;
      const startMinute = document.getElementById("startMinute").value;

      const endDate = document.getElementById("endDate").value;
      const endHour = document.getElementById("endHour").value;
      const endMinute = document.getElementById("endMinute").value;

      const display = document.getElementById("durationDisplay");

      if (startDate && endDate && startHour && endHour) {
        const start = new Date(`${startDate}T${startHour}:${startMinute}:00`);
        const end = new Date(`${endDate}T${endHour}:${endMinute}:00`);

        const diffMs = end - start;
        const diffHours = diffMs / (1000 * 60 * 60);

        if (diffHours < 0) {
          display.innerText = "時間錯誤 (結束需晚於開始)";
          display.style.color = "var(--danger)";
        } else {
          display.innerText = `${diffHours} hrs`;
          display.style.color = "var(--accent)";
        }
      } else {
        display.innerText = "0 hrs";
        display.style.color = "var(--text2)";
      }
    }

    // 送出申請邏輯
    function submitLeave() {
      const leaveType = document.getElementById("leaveType");
      const leaveTypeText = leaveType.options[leaveType.selectedIndex].text;
      const startTime = `${document.getElementById("startDate").value}T${document.getElementById("startHour").value}:${document.getElementById("startMinute").value}`;
      const endTime = `${document.getElementById("endDate").value}T${document.getElementById("endHour").value}:${document.getElementById("endMinute").value}`;
      const reason = document.getElementById("reason").value;
      const durationText = document.getElementById("durationDisplay").innerText;

      if(durationText.includes("錯誤")) {
        alert("請確認結束時間晚於開始時間！");
        return;
      }

      console.log("申請假別：", leaveTypeText);
      console.log("申請開始：", startTime);
      console.log("申請結束：", endTime);
      console.log("總計時數：", durationText);
      console.log("請假原因：", reason);
      
      alert(`已送出申請：\n假別：${leaveTypeText}\n時數：${durationText}\n請至 Console 查看詳細資訊！`);
    }
  </script>

</body>
</html>
